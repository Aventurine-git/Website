<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}

<body>
  <div class="l1">Aventurine 800</div>
  <div class="l2">Aventurine 600</div>
