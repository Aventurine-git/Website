<!-- @dsCard group="Spacing" viewport="700x200" subtitle="Plum-tinted shadows, never pure black \u2014 plus the colored bloom glow" name="Shadows" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-shell);height:200px;display:flex;align-items:center;justify-content:center;gap:22px;}
  .box{width:80px;height:80px;background:var(--surface-card);border-radius:var(--radius-md);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:10px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="box" style="box-shadow:var(--shadow-xs);">xs</div>
  <div class="box" style="box-shadow:var(--shadow-sm);">sm</div>
  <div class="box" style="box-shadow:var(--shadow-md);">md</div>
  <div class="box" style="box-shadow:var(--shadow-lg);">lg</div>
  <div class="box" style="box-shadow:var(--shadow-xl);">xl</div>
  <div class="box" style="box-shadow:var(--shadow-bloom);">bloom</div>
</body></html>
