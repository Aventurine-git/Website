<!-- @dsCard group="Spacing" viewport="700x240" subtitle="4px-based scale, space-1 through space-9" name="Spacing Scale" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-mono);background:var(--surface-page);height:240px;padding:20px 28px;display:flex;flex-direction:column;gap:6px;justify-content:center;}
  .row{display:flex;align-items:center;gap:10px;}
  .bar{background:var(--av-green);height:14px;border-radius:3px;}
  .tag{font-size:10px;color:var(--text-tertiary);width:110px;flex-shrink:0;}
</style></head>
<body>
  <div class="row"><span class="tag">space-1 / 4px</span><div class="bar" style="width:4px;"></div></div>
  <div class="row"><span class="tag">space-2 / 8px</span><div class="bar" style="width:8px;"></div></div>
  <div class="row"><span class="tag">space-3 / 12px</span><div class="bar" style="width:12px;"></div></div>
  <div class="row"><span class="tag">space-4 / 16px</span><div class="bar" style="width:16px;"></div></div>
  <div class="row"><span class="tag">space-5 / 24px</span><div class="bar" style="width:24px;"></div></div>
  <div class="row"><span class="tag">space-6 / 32px</span><div class="bar" style="width:32px;"></div></div>
  <div class="row"><span class="tag">space-7 / 48px</span><div class="bar" style="width:48px;"></div></div>
  <div class="row"><span class="tag">space-8 / 64px</span><div class="bar" style="width:64px;"></div></div>
  <div class="row"><span class="tag">space-9 / 96px</span><div class="bar" style="width:96px;"></div></div>
</body></html>
