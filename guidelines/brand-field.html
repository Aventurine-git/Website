<!-- @dsCard group="Brand" viewport="700x260" subtitle="The core motif \u2014 overlapping color blooms, no negative space" name="Color Field" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:260px;overflow:hidden;background:var(--av-powder);}
  .field{position:absolute;inset:-15%;}
  .blob{position:absolute;filter:blur(40px);}
  .b1{top:-14%;left:-14%;width:80%;height:78%;background:radial-gradient(ellipse at 45% 45%, var(--av-butter), #bda87d 70%, transparent 100%);}
  .b2{top:-6%;right:-16%;width:82%;height:80%;background:radial-gradient(ellipse at 55% 50%, var(--av-magenta), #ac8ba0 68%, transparent 100%);}
  .b3{bottom:-16%;left:-12%;width:80%;height:78%;background:radial-gradient(ellipse at 50% 50%, var(--av-green), #869e8a 70%, transparent 100%);}
  .b4{bottom:-12%;right:-12%;width:76%;height:76%;background:radial-gradient(ellipse at 50% 50%, var(--av-periwinkle), #8b82a5 68%, transparent 100%);}
  .b5{top:20%;left:20%;width:58%;height:58%;background:radial-gradient(ellipse at 50% 50%, rgba(194,151,176,0.5), transparent 75%);}
</style></head>
<body>
  <div class="field">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div><div class="blob b5"></div>
  </div>
</body></html>
