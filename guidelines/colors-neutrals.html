<!-- @dsCard group="Colors" viewport="700x190" subtitle="Warm-cool grays \u2014 never pure black or white" name="Neutrals" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);}
  .row{display:flex;height:190px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
  .name{font-size:12px;font-weight:600;}
  .hex{font-size:10px;font-family:var(--font-mono);opacity:.75;margin-top:2px;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--av-ink);color:var(--av-cream-hi);"><div class="name">Ink</div><div class="hex">#241F2B</div></div>
  <div class="sw" style="background:var(--av-ink-soft);color:var(--av-cream-hi);"><div class="name">Ink Soft</div><div class="hex">#443C4F</div></div>
  <div class="sw" style="background:var(--av-slate);color:var(--av-cream-hi);"><div class="name">Slate</div><div class="hex">#6D6577</div></div>
  <div class="sw" style="background:var(--av-shell);color:var(--av-ink);"><div class="name">Shell</div><div class="hex">#ECE5DA</div></div>
  <div class="sw" style="background:var(--av-cream);color:var(--av-ink);"><div class="name">Cream</div><div class="hex">#F5EFE4</div></div>
  <div class="sw" style="background:var(--av-cream-hi);color:var(--av-ink);"><div class="name">Cream Hi</div><div class="hex">#FBF7EF</div></div>
  <div class="sw" style="background:var(--av-dusk);color:var(--av-cream-hi);"><div class="name">Dusk</div><div class="hex">#15121A</div></div>
</div>
</body></html>
