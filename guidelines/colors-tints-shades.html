<!-- @dsCard group="Colors" viewport="700x220" subtitle="Lighter tints for washes, deeper shades for text-on-color" name="Tints & Shades" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-page);}
  .wrap{display:flex;height:220px;}
  .label{width:56px;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary);flex-shrink:0;}
  .rows{flex:1;display:flex;flex-direction:column;}
  .row{flex:1;display:flex;}
  .sw{flex:1;}
</style></head>
<body>
<div class="wrap">
  <div class="rows">
    <div class="row">
      <div class="sw" style="background:var(--av-green-tint);"></div>
      <div class="sw" style="background:var(--av-magenta-tint);"></div>
      <div class="sw" style="background:var(--av-butter-tint);"></div>
      <div class="sw" style="background:var(--av-periwinkle-tint);"></div>
      <div class="sw" style="background:var(--av-mauve-tint);"></div>
    </div>
    <div class="row">
      <div class="sw" style="background:var(--av-green-deep);"></div>
      <div class="sw" style="background:var(--av-magenta-deep);"></div>
      <div class="sw" style="background:var(--av-butter-deep);"></div>
      <div class="sw" style="background:var(--av-periwinkle-deep);"></div>
      <div class="sw" style="background:var(--av-mauve-deep);"></div>
    </div>
  </div>
</div>
</body></html>
