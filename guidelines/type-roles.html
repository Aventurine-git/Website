<!-- @dsCard group="Type" viewport="700x360" subtitle="Hero, heading, subhead, body, quote, and label roles together" name="Type Roles In Use" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-page);height:360px;padding:24px 28px;display:flex;flex-direction:column;gap:10px;justify-content:center;}
  .label{font:var(--role-label);letter-spacing:var(--tracking-wider);text-transform:uppercase;color:var(--av-magenta-deep);}
  .heading{font:var(--role-heading);color:var(--text-primary);font-size:34px;}
  .subhead{font:var(--role-subhead);color:var(--text-primary);font-size:19px;}
  .body{font:var(--role-body);color:var(--text-secondary);font-size:15px;max-width:600px;}
  .quote{font:var(--role-quote);color:var(--av-mauve-deep);font-size:22px;}
</style></head>
<body>
  <div class="label">still blooming</div>
  <div class="heading">The full world is on its way.</div>
  <div class="subhead">Prints, video downloads, commissions.</div>
  <div class="body">Right now this is a doorway, not a house \u2014 come wander, come watch, come make noise in the group.</div>
  <div class="quote">&ldquo;let your mind off leash&rdquo;</div>
</body></html>
