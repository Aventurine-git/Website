<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-page);height:180px;display:flex;align-items:center;justify-content:center;gap:20px;}
  .box{width:74px;height:74px;background:var(--av-periwinkle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:#1c1730;font-weight:600;}
</style></head>
<body>
  <div class="box" style="border-radius:var(--radius-sm);">sm</div>
  <div class="box" style="border-radius:var(--radius-md);">md</div>
  <div class="box" style="border-radius:var(--radius-lg);">lg</div>
  <div class="box" style="border-radius:var(--radius-xl);">xl</div>
  <div class="box" style="border-radius:var(--radius-pill);">pill</div>
  <div class="box" style="border-radius:var(--radius-blob);">blob</div>
</body></html>
