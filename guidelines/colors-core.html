<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);}
  .row{display:flex;height:200px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
  .name{font-size:13px;font-weight:600;}
  .hex{font-size:11px;font-family:var(--font-mono);opacity:.75;margin-top:2px;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--av-green);color:#1e2e20;"><div class="name">Aventurine</div><div class="hex">#99B59D</div></div>
  <div class="sw" style="background:var(--av-magenta);color:#2e1c27;"><div class="name">Magenta</div><div class="hex">#C297B0</div></div>
  <div class="sw" style="background:var(--av-butter);color:#302710;"><div class="name">Butter</div><div class="hex">#CBB98A</div></div>
  <div class="sw" style="background:var(--av-periwinkle);color:#1c1730;"><div class="name">Periwinkle</div><div class="hex">#9F96B8</div></div>
  <div class="sw" style="background:var(--av-mauve);color:#171326;"><div class="name">Mauve</div><div class="hex">#8B83A3</div></div>
</div>
</body></html>
