<!-- @dsCard group="Type" viewport="700x360" subtitle="The full type scale, xs through 4xl" name="Type Scale" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-display);background:var(--surface-page);display:flex;flex-direction:column;justify-content:center;height:360px;padding:0 28px;gap:2px;}
  .row{display:flex;align-items:baseline;gap:14px;}
  .sample{color:var(--text-primary);font-weight:700;white-space:nowrap;flex:1 1 auto;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);width:80px;flex:0 0 80px;}
</style></head>
<body>
  <div class="row"><span class="tag">4xl / 80</span><span class="sample" style="font-size:56px;">Aventurine</span></div>
  <div class="row"><span class="tag">3xl / 56</span><span class="sample" style="font-size:40px;">Aventurine</span></div>
  <div class="row"><span class="tag">2xl / 40</span><span class="sample" style="font-size:32px;">Aventurine</span></div>
  <div class="row"><span class="tag">xl / 30</span><span class="sample" style="font-size:26px;">Aventurine</span></div>
  <div class="row"><span class="tag">lg / 22</span><span class="sample" style="font-size:20px;font-weight:500;">Aventurine</span></div>
  <div class="row"><span class="tag">md / 18</span><span class="sample" style="font-size:17px;font-weight:400;">Aventurine</span></div>
  <div class="row"><span class="tag">base / 16</span><span class="sample" style="font-size:15px;font-weight:400;">Aventurine</span></div>
  <div class="row"><span class="tag">sm / 14</span><span class="sample" style="font-size:13px;font-weight:400;">Aventurine</span></div>
  <div class="row"><span class="tag">xs / 12</span><span class="sample" style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">Aventurine</span></div>
</body></html>
