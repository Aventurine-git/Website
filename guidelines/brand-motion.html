<!-- @dsCard group="Brand" viewport="700x170" subtitle="Slow drift, no snap \u2014 easing curves used across the system" name="Motion & Easing" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-mono);background:var(--surface-page);height:170px;display:flex;align-items:center;justify-content:center;gap:36px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .dot{width:20px;height:20px;border-radius:50%;background:var(--av-green);animation:move 2.2s infinite alternate;}
  .col:nth-child(1) .dot{animation-timing-function:var(--ease-soft);}
  .col:nth-child(2) .dot{animation-timing-function:var(--ease-bloom);background:var(--av-magenta);}
  .col:nth-child(3) .dot{animation-timing-function:var(--ease-out);background:var(--av-periwinkle);}
  @keyframes move{to{transform:translateX(90px);}}
  .track{width:110px;height:20px;position:relative;}
  .label{font-size:10px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="col"><div class="track"><div class="dot"></div></div><div class="label">ease-soft</div></div>
  <div class="col"><div class="track"><div class="dot"></div></div><div class="label">ease-bloom</div></div>
  <div class="col"><div class="track"><div class="dot"></div></div><div class="label">ease-out</div></div>
</body></html>
